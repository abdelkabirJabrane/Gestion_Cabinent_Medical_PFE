apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicab-frontend
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medicab-frontend
  template:
    metadata:
      labels:
        app: medicab-frontend
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: medicab-frontend
          image: abdojab/medicab-frontend:13
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: medicab-frontend
  namespace: medicab
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
  selector:
    app: medicab-frontend
