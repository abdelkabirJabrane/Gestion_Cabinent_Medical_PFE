apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: api-gateway
          image: abdojab/api-gateway:11
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-service:9999"
            - name: CONFIG_URL
              value: "optional:configserver:http://config-service:9999"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medicab
spec:
  type: NodePort
  ports:
    - port: 8080
      nodePort: 30080
  selector:
    app: api-gateway
