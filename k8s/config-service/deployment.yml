apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: config-service
          image: abdojab/config-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9999
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: medicab
spec:
  ports:
    - port: 9999
  selector:
    app: config-service
