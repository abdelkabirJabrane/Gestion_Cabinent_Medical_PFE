apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: discovery-service
          image: abdojab/discovery-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-service:8888"
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: medicab
spec:
  ports:
    - port: 8761
  selector:
    app: discovery-service
