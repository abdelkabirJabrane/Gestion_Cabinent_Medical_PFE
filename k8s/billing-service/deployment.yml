apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: billing-service
          image: abdojab/billing-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/billingdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "medicab"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medicab-secrets
                  key: postgres-password
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-service:9999"
            - name: CONFIG_URL
              value: "optional:configserver:http://config-service:9999"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-service:9999"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: medicab
spec:
  ports:
    - port: 8080
  selector:
    app: billing-service
