apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: ai-service
          image: abdojab/ai-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: AI_SERVICE_PORT
              value: "8000"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: medicab
spec:
  ports:
    - port: 8000
  selector:
    app: ai-service
