# ==========================================
# CONFIG SERVICE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: config-service
          image: abdojab/config-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: medicab
spec:
  ports:
    - port: 8888
  selector:
    app: config-service

---
# ==========================================
# DISCOVERY SERVICE (Eureka)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: discovery-service
          image: abdojab/discovery-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-service:8888"
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: medicab
spec:
  ports:
    - port: 8761
  selector:
    app: discovery-service

---
# ==========================================
# API GATEWAY
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: api-gateway
          image: abdojab/api-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: medicab
spec:
  type: NodePort
  ports:
    - port: 8080
      nodePort: 30080
  selector:
    app: api-gateway

---
# ==========================================
# AUTH SERVICE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: auth-service
          image: abdojab/auth-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/authdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "medicab"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "medicab123"
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-service:8888"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: medicab
spec:
  ports:
    - port: 8080
  selector:
    app: auth-service

