apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: medicab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: patient-service
          image: abdojab/patient-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/patientdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "medicab"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medicab-secrets
                  key: postgres-password
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: medicab
spec:
  ports:
    - port: 8080
  selector:
    app: patient-service
