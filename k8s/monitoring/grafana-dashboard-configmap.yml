apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  dashboard-providers.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
  springboot-12900.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 12900,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "timeseries",
          "title": "JVM Heap Memory Used",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "jvm_memory_used_bytes{area=\"heap\"}",
              "legendFormat": "{{application}} ({{id}})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "JVM System CPU Load",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "system_cpu_usage",
              "legendFormat": "{{application}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP Requests Second Rate",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "rate(http_server_requests_seconds_count[1m])",
              "legendFormat": "{{uri}} ({{status}})",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["springboot"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "Spring Boot (ID 12900)",
      "uid": "springboot_12900",
      "version": 1
    }
  k8s-6417.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 6417,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "timeseries",
          "title": "Kubernetes Node CPU Load",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "instance:node_cpu_utilisation:rate1m",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Kubernetes Node Memory Usage",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "node_memory_Active_bytes / node_memory_MemTotal_bytes * 100",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["kubernetes"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "Kubernetes Cluster Overview (ID 6417)",
      "uid": "k8s_6417",
      "version": 1
    }
  jvm-4701.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": 4701,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "timeseries",
          "title": "JVM Live Threads",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "jvm_threads_live_threads",
              "legendFormat": "{{application}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "JVM GC Pause Time",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "expr": "jvm_gc_pause_seconds_sum",
              "legendFormat": "{{application}} ({{action}})",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["jvm"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "JVM Micrometer (ID 4701)",
      "uid": "jvm_4701",
      "version": 1
    }
