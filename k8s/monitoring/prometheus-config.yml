apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      - job_name: 'config-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['config-service.medicab.svc.cluster.local:9999']

      - job_name: 'discovery-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['discovery-service.medicab.svc.cluster.local:8761']

      - job_name: 'api-gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['api-gateway.medicab.svc.cluster.local:8080']

      - job_name: 'auth-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['auth-service.medicab.svc.cluster.local:8080']

      - job_name: 'patient-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['patient-service.medicab.svc.cluster.local:8080']

      - job_name: 'appointment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['appointment-service.medicab.svc.cluster.local:8080']

      - job_name: 'billing-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['billing-service.medicab.svc.cluster.local:8080']

      - job_name: 'medical-record-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['medical-record-service.medicab.svc.cluster.local:8080']

      - job_name: 'ordonnance-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['ordonnance-service.medicab.svc.cluster.local:8080']

      - job_name: 'ai-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['ai-service.medicab.svc.cluster.local:8000']
