name: Backend Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-java-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          api-gateway,
          appointment-service,
          auth-service,
          billing-service,
          config-service,
          discovery-service,
          medical-record-service,
          ordonnance-service,
          patient-service
        ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn test

  test-ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd ai-service
          pytest
