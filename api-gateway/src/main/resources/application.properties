spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true



# Patient Service
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/**

# Appointment Service
spring.cloud.gateway.routes[1].id=appointment-service
spring.cloud.gateway.routes[1].uri=lb://appointment-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/appointments/**

# Medical Record Service
spring.cloud.gateway.routes[2].id=medical-record-service
spring.cloud.gateway.routes[2].uri=lb://medical-record-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/dossiers/**,/api/consultations/**

# Billing Service
spring.cloud.gateway.routes[3].id=billing-service
spring.cloud.gateway.routes[3].uri=lb://billing-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/factures/**

# Notification Service
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**

# Auth Service
spring.cloud.gateway.routes[5].id=auth-service
spring.cloud.gateway.routes[5].uri=lb://auth-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/auth/**

# AI Service (Python/FastAPI — MedAgent)
spring.cloud.gateway.routes[6].id=ai-service
spring.cloud.gateway.routes[6].uri=http://localhost:8000
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/ai/**,/ws/**

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always




